name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npx allure generate allure-results --clean -o allure-report
    - name: Zip Allure Report
      if: ${{ !cancelled() }}
      run: zip -r allure-report.zip allure-report/
    - name: Send Email with Report
      if: ${{ !cancelled() }}
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.office365.com
        server_port: 587
        username: ${{ secrets.OUTLOOK_EMAIL }}
        password: ${{ secrets.OUTLOOK_PASSWORD }}
        subject: "Playwright Test Report - ${{ github.repository }}"
        to: ${{ secrets.OUTLOOK_EMAIL }}
        from: ${{ secrets.OUTLOOK_EMAIL }}
        body: "Test run completed. Allure report attached."
        attachments: allure-report.zip
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
